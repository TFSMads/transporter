name: Transporter Build (Labymod 4)

on:
  push:
    branches: [ "labymod-4" ]
  pull_request:
    branches: [ "labymod-4" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'corretto'
          java-version: '17'
      - name: Update all submodules
        run: |
          git rm -r core/src/main/java/ml/volder/transporter
          git submodule add -b transporter-src https://github.com/TFSMads/transporter.git core/src/main/java/ml/volder/transporter
          git rm -r core/src/main/java/ml/volder/unikapi
          git submodule add -b laby4-unikapi https://github.com/TFSMads/UnikAPI.git core/src/main/java/ml/volder/unikapi
          git rm -r game-runner/src
          git submodule add -b laby4-gamerunner https://github.com/TFSMads/UnikAPI.git game-runner/src
          git rm -r core/src/main/resources/assets/transporter/transporter
          git submodule add -b transporter-assets https://github.com/TFSMads/transporter.git core/src/main/resources/assets/transporter/transporter
          git rm -r core/src/main/resources/assets/transporter/unikapi
          git submodule add -b laby4-assets https://github.com/TFSMads/UnikAPI.git core/src/main/resources/assets/transporter/unikapi
          git rm -r core/src/main/resources/transporter
          git submodule add -b transporter-assets2 https://github.com/TFSMads/transporter.git core/src/main/resources/transporter
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build with Gradle
        run: ./gradlew build --full-stacktrace
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Artifacts
          path: build/libs/*-release.jar
